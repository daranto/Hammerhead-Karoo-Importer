version: '3.9'

services:
  app:
    image: ghcr.io/daranto/hammerhead-karoo-importer:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - hh-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/hammerhead.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost:3001}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  hh-data:
    driver: local
